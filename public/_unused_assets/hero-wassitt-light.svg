<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Soft Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff" />
      <stop offset="50%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f0fdf4" />
    </linearGradient>
    <linearGradient id="circle-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.04" />
    </linearGradient>
    <!-- Phone Screen Gradients -->
    <linearGradient id="phone-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <!-- Accent Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    <filter id="phone-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#1e3a8a" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="800" height="600" fill="url(#bg-grad)" />

  <!-- Large Soft Graphic Circles -->
  <circle cx="280" cy="300" r="260" fill="url(#circle-grad)" />
  <circle cx="580" cy="220" r="180" fill="url(#circle-grad)" />

  <!-- ============================================================
       BACKGROUND LANDMARKS (Syrian Atmosphere - Damascus & Aleppo)
       ============================================================ -->
  <g opacity="0.3">
    <!-- Mountain Outline (Mount Qasioun Damascus) -->
    <path d="M-50,380 L120,320 L280,350 L420,290 L600,340 L850,280 L900,600 L-50,600 Z" fill="#e2e8f0" />
    <path d="M120,320 L220,360 L380,310 L500,350 L700,295 L850,330 L850,600 L120,600 Z" fill="#cbd5e1" opacity="0.5" />

    <!-- Damascus Minarets & Dome Outline (Left) -->
    <g transform="translate(60, 240)">
      <!-- Minaret 1 -->
      <rect x="20" y="30" width="10" height="70" fill="#94a3b8" />
      <polygon points="17,30 25,10 33,30" fill="#64748b" />
      <!-- Dome -->
      <path d="M40,100 C40,70 80,70 80,100 Z" fill="#94a3b8" />
      <rect x="58" y="55" width="4" height="20" fill="#64748b" />
      <circle cx="60" cy="50" r="3" fill="#64748b" />
      <!-- Minaret 2 -->
      <rect x="90" y="15" width="8" height="85" fill="#94a3b8" />
      <polygon points="87,15 94,-5 101,15" fill="#64748b" />
    </g>

    <!-- Aleppo Citadel Entrance Bridge (Right/Center Backdrop) -->
    <g transform="translate(300, 270)">
      <!-- Citadel Wall -->
      <path d="M0,80 L200,80 L180,30 L20,30 Z" fill="#94a3b8" />
      <!-- Arch Gate -->
      <path d="M85,80 C85,60 115,60 115,80 Z" fill="#475569" />
      <!-- Bridge Arches -->
      <path d="M-150,110 L0,110 L0,80 L-150,80 Z" fill="#94a3b8" />
      <path d="M-130,110 C-130,95 -110,95 -110,110 Z" fill="#cbd5e1" />
      <path d="M-90,110 C-90,95 -70,95 -70,110 Z" fill="#cbd5e1" />
      <path d="M-50,110 C-50,95 -30,95 -30,110 Z" fill="#cbd5e1" />
    </g>
  </g>

  <!-- ============================================================
       THE SYRIAN FLAG (Green, White, Black with 3 Red Stars)
       ============================================================ -->
  <g transform="translate(70, 100)" filter="url(#shadow)">
    <!-- Flagpole -->
    <rect x="0" y="0" width="6" height="340" rx="3" fill="#64748b" />
    <circle cx="3" cy="0" r="6" fill="#cbd5e1" />

    <!-- Flag Cloth (Waving SVG Path) -->
    <!-- Top Green Stripe -->
    <path d="M6,10 C46,-2 76,18 116,10 L116,45 C76,53 46,33 6,45 Z" fill="#007a3d" />
    <!-- Middle White Stripe -->
    <path d="M6,45 C46,33 76,53 116,45 L116,80 C76,88 46,68 6,80 Z" fill="#ffffff" />
    <!-- Bottom Black Stripe -->
    <path d="M6,80 C46,68 76,88 116,80 L116,115 C76,123 46,103 6,115 Z" fill="#000000" />

    <!-- Flag Border Line for Premium Vector Look -->
    <path d="M6,10 C46,-2 76,18 116,10 L116,115 C76,123 46,103 6,115 Z" fill="none" stroke="#e2e8f0" stroke-width="0.5" />

    <!-- 3 Red Stars in the Middle White Stripe -->
    <!-- Star Path Template scaled & translated -->
    <!-- Star 1 (X=32) -->
    <path d="M 0,-7 L 2.05,-2.05 L 7,-2.05 L 3.09,1.02 L 4.45,5.97 L 0,2.92 L -4.45,5.97 L -3.09,1.02 L -7,-2.05 L -2.05,-2.05 Z" transform="translate(34, 62) scale(0.9)" fill="#ce1126" />
    <!-- Star 2 (X=61) -->
    <path d="M 0,-7 L 2.05,-2.05 L 7,-2.05 L 3.09,1.02 L 4.45,5.97 L 0,2.92 L -4.45,5.97 L -3.09,1.02 L -7,-2.05 L -2.05,-2.05 Z" transform="translate(61, 64) scale(0.9)" fill="#ce1126" />
    <!-- Star 3 (X=88) -->
    <path d="M 0,-7 L 2.05,-2.05 L 7,-2.05 L 3.09,1.02 L 4.45,5.97 L 0,2.92 L -4.45,5.97 L -3.09,1.02 L -7,-2.05 L -2.05,-2.05 Z" transform="translate(88, 62) scale(0.9)" fill="#ce1126" />
  </g>

  <!-- ============================================================
       SMARTPHONE MOCKUP (Wassitt Client App Interface)
       ============================================================ -->
  <g transform="translate(480, 100)" filter="url(#phone-shadow)">
    <!-- Outer Phone Shell -->
    <rect width="220" height="440" rx="36" fill="#0f172a" />
    <!-- Inner Screen Area -->
    <rect x="8" y="8" width="204" height="424" rx="28" fill="#ffffff" />

    <!-- Screen Content -->
    <!-- Header / Brand -->
    <rect x="8" y="8" width="204" height="50" rx="0" fill="url(#phone-grad)" clip-path="inset(0px 0px 0px 0px round 28px 28px 0px 0px)" />
    <path d="M 8,58 L 212,58" stroke="#1e40af" stroke-width="1" />
    
    <!-- Wassitt Branding on screen -->
    <text x="110" y="38" fill="#ffffff" font-family="Arial, sans-serif" font-weight="900" font-size="14" text-anchor="middle" letter-spacing="1">W A S S I T T</text>
    
    <!-- Phone Notch -->
    <rect x="70" y="8" width="80" height="15" rx="7" fill="#0f172a" />
    <circle cx="80" cy="15" r="2.5" fill="#1e293b" />
    <rect x="115" y="13" width="20" height="3" rx="1.5" fill="#1e293b" />

    <!-- App Content List -->
    <!-- Search Bar Mock -->
    <rect x="20" y="72" width="180" height="26" rx="13" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
    <text x="32" y="89" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Search services (Damascus...)</text>
    <circle cx="184" cy="85" r="4" fill="none" stroke="#94a3b8" stroke-width="1.5" />
    <line x1="187" y1="88" x2="192" y2="93" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" />

    <!-- Category Mock Cards -->
    <text x="20" y="118" fill="#1e293b" font-family="Arial, sans-serif" font-weight="bold" font-size="11">Popular Services</text>

    <!-- Category Card 1 (Maintenance) -->
    <rect x="20" y="128" width="180" height="42" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <!-- Icon Placeholder -->
    <rect x="28" y="134" width="30" height="30" rx="6" fill="#eff6ff" />
    <path d="M43,142 L43,156 M36,149 L50,149" stroke="#2563eb" stroke-width="2" stroke-linecap="round" />
    <text x="66" y="147" fill="#1e293b" font-family="Arial, sans-serif" font-weight="bold" font-size="10">Home Maintenance</text>
    <text x="66" y="159" fill="#10b981" font-family="Arial, sans-serif" font-weight="bold" font-size="9">24 Verified Offers</text>
    <circle cx="184" cy="149" r="6" fill="#2563eb" />
    <path d="M182,149 L186,149 M184,147 L184,151" stroke="#ffffff" stroke-width="1" />

    <!-- Category Card 2 (Programming) -->
    <rect x="20" y="178" width="180" height="42" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    <rect x="28" y="184" width="30" height="30" rx="6" fill="#f0fdf4" />
    <path d="M38,194 L41,199 L48,199" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <text x="66" y="197" fill="#1e293b" font-family="Arial, sans-serif" font-weight="bold" font-size="10">IT &amp; Programming</text>
    <text x="66" y="209" fill="#64748b" font-family="Arial, sans-serif" font-size="9">Develop mobile app</text>

    <!-- Verified Job Match Card Popup (Highlighting Platform Value) -->
    <g transform="translate(10, 235)" filter="url(#shadow)">
      <rect x="0" y="0" width="200" height="120" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
      <!-- Match Success Header -->
      <rect x="0" y="0" width="200" height="28" rx="0" fill="#10b981" clip-path="inset(0px 0px 0px 0px round 14px 14px 0px 0px)" />
      <text x="100" y="18" fill="#ffffff" font-family="Arial, sans-serif" font-weight="bold" font-size="10" text-anchor="middle">✔ CONTRACT CHOSEN</text>
      
      <!-- Avatar & Detail -->
      <circle cx="32" cy="58" r="16" fill="#e2e8f0" />
      <!-- Silhouette avatar -->
      <circle cx="32" cy="54" r="6" fill="#475569" />
      <path d="M22,68 C22,62 26,62 32,62 C38,62 42,62 42,68 Z" fill="#475569" />
      
      <text x="56" y="55" fill="#1e293b" font-family="Arial, sans-serif" font-weight="bold" font-size="10">Yassin M. (Damascus)</text>
      <text x="56" y="67" fill="#64748b" font-family="Arial, sans-serif" font-size="9">Certified Electrician</text>
      
      <line x1="16" y1="82" x2="184" y2="82" stroke="#e2e8f0" stroke-width="1" />
      
      <!-- Price & Rating -->
      <text x="20" y="103" fill="#10b981" font-family="Arial, sans-serif" font-weight="extrabold" font-size="11">Rating: 4.9 ★</text>
      <rect x="120" y="90" width="64" height="20" rx="6" fill="#2563eb" />
      <text x="152" y="103" fill="#ffffff" font-family="Arial, sans-serif" font-weight="bold" font-size="9" text-anchor="middle">Secure Deal</text>
    </g>

    <!-- Safe Shield Icon Floating -->
    <circle cx="195" cy="55" r="18" fill="#3b82f6" filter="url(#shadow)" />
    <path d="M190,50 L195,48 L200,50 L200,55 C200,59 197,61 195,62 C193,61 190,59 190,55 Z" fill="#ffffff" />

    <!-- Bottom Indicator -->
    <rect x="70" y="424" width="80" height="4" rx="2" fill="#94a3b8" />
  </g>

  <!-- ============================================================
       PEOPLE ILLUSTRATIONS (Clean SaaS Vector Style)
       ============================================================ -->
  <!-- Character 1: Architect / Engineer (Center-Left) -->
  <g transform="translate(230, 310)">
    <!-- Body -->
    <path d="M30,120 L80,120 L75,70 L35,70 Z" fill="#1e3a8a" />
    <path d="M15,190 C15,140 25,120 40,120 L70,120 C85,120 95,140 95,190 Z" fill="#3b82f6" />
    <!-- Neck -->
    <rect x="49" y="58" width="12" height="15" fill="#fbcfe8" />
    <!-- Head -->
    <circle cx="55" cy="45" r="18" fill="#fed7aa" />
    <!-- Face details -->
    <circle cx="49" cy="42" r="1.5" fill="#1e293b" />
    <circle cx="61" cy="42" r="1.5" fill="#1e293b" />
    <path d="M51,52 C51,55 59,55 59,52" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round" />
    <!-- Hair -->
    <path d="M37,42 C37,28 73,28 73,42 Z" fill="#475569" />
    <!-- White Hardhat (Syrian construction worker/engineer) -->
    <path d="M34,31 C34,16 76,16 76,31 Z" fill="#ffffff" />
    <rect x="30" y="27" width="50" height="5" rx="2.5" fill="#e2e8f0" />
    <rect x="52" y="16" width="6" height="12" fill="#cbd5e1" />
    <!-- Blueprint Roll -->
    <rect x="75" y="130" width="14" height="60" rx="3" fill="#cbd5e1" transform="rotate(25 75 130)" />
    <rect x="78" y="133" width="8" height="54" fill="#ffffff" transform="rotate(25 75 130)" />
  </g>

  <!-- Character 2: Creative Professional / Designer (Left side) -->
  <g transform="translate(110, 340)">
    <!-- Body -->
    <path d="M10,180 C10,140 25,130 45,130 L55,130 C75,130 90,140 90,180 Z" fill="#0d9488" />
    <rect x="44" y="68" width="12" height="15" fill="#fed7aa" />
    <!-- Head (Female with hijab/headscarf representing Syrian culture) -->
    <circle cx="50" cy="54" r="17" fill="#fed7aa" />
    <!-- Hijab Frame -->
    <path d="M32,54 C32,32 68,32 68,54 C68,75 32,75 32,54 Z" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1" />
    <circle cx="50" cy="52" r="14" fill="#fde047" /> <!-- Inner under-cap -->
    <circle cx="50" cy="54" r="12.5" fill="#fed7aa" /> <!-- Face -->
    <!-- Eyes -->
    <circle cx="45" cy="51" r="1.5" fill="#1e293b" />
    <circle cx="55" cy="51" r="1.5" fill="#1e293b" />
    <path d="M47,59 C47,61 53,61 53,59" fill="none" stroke="#1e293b" stroke-width="1" stroke-linecap="round" />
    <!-- White headscarf outer wrap -->
    <path d="M33,48 C33,30 67,30 67,48 C67,68 62,80 50,80 C38,80 33,68 33,48 Z" fill="none" stroke="#e2e8f0" stroke-width="3" />
    <!-- Tablet -->
    <rect x="58" y="115" width="36" height="48" rx="4" fill="#334155" transform="rotate(-15 58 115)" />
    <rect x="61" y="118" width="30" height="42" rx="2" fill="#ffffff" transform="rotate(-15 58 115)" stroke="#64748b" stroke-width="0.5" />
    <circle cx="76" cy="155" r="2" fill="#cbd5e1" />
  </g>

  <!-- Character 3: Modern Syrian Customer / Tech Professional (Center-Right) -->
  <g transform="translate(350, 310)">
    <!-- Body -->
    <path d="M15,190 C15,145 25,125 45,125 L65,125 C85,125 95,145 95,190 Z" fill="#475569" />
    <rect x="49" y="65" width="12" height="15" fill="#fed7aa" />
    <!-- Head -->
    <circle cx="55" cy="50" r="18" fill="#fed7aa" />
    <!-- Hair & Beard (Modern Syrian look) -->
    <path d="M37,45 C35,28 75,28 73,45 Z" fill="#1e293b" />
    <path d="M37,48 C37,65 73,65 73,48 C73,60 37,60 37,48 Z" fill="#1e293b" opacity="0.9" /> <!-- Beard -->
    <!-- Face -->
    <circle cx="55" cy="48" r="14" fill="#fed7aa" />
    <circle cx="49" cy="46" r="1.5" fill="#1e293b" />
    <circle cx="61" cy="46" r="1.5" fill="#1e293b" />
    <path d="M51,54 C51,57 59,57 59,54" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round" />
    <!-- Customer Holding Phone pointing to the actual big phone -->
    <path d="M80,125 L92,110 L102,120 L90,135 Z" fill="#fed7aa" />
  </g>

  <!-- ============================================================
       CONNECTION NETWORK NODES (Digital Marketplace Concept)
       ============================================================ -->
  <!-- Dashed Connection Lines -->
  <path d="M180,410 C260,370 320,380 480,320" fill="none" stroke="#10b981" stroke-width="3" stroke-dasharray="8 6" opacity="0.7" />
  <path d="M280,380 C340,320 400,320 480,260" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="8 6" opacity="0.7" />
  <path d="M410,380 C440,370 460,350 480,350" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="8 6" opacity="0.8" />

  <!-- Pulses / Glowing Nodes -->
  <g transform="translate(320, 360)">
    <circle cx="0" cy="0" r="12" fill="#3b82f6" opacity="0.2">
      <animate attributeName="r" values="8;16;8" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="6" fill="#3b82f6" />
  </g>
  <g transform="translate(190, 420)">
    <circle cx="0" cy="0" r="10" fill="#10b981" opacity="0.2">
      <animate attributeName="r" values="6;12;6" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="5" fill="#10b981" />
  </g>
</svg>
