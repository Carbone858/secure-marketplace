name: Build Android APK

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_TELEMETRY_DISABLED: 1
      NODE_OPTIONS: "--max_old_space_size=4096"
      DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
      JWT_SECRET: "placeholder-secret-at-least-32-chars-long"
      JWT_SECRET: "placeholder-secret-at-least-32-chars-long"
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Next.js Standalone Build
        run: npm run build

      - name: Prepare Mobile Assets
        run: |
          mkdir out
          echo "<html><head><meta http-equiv='refresh' content='0;url=https://secure-marketplace.com'></head><body>Redirecting to Marketplace...</body></html>" > out/index.html

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build Android
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: secure-marketplace-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk


