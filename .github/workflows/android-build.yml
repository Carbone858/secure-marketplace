name: Build Android APK

on:
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare Mobile Assets
        run: |
          mkdir out
          echo "<html><head><meta http-equiv='refresh' content='0;url=https://secure-marketplace.com'></head><body>Redirecting to Marketplace...</body></html>" > out/index.html

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build Android
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info

      - name: List output files
        run: ls -R android/app/build/outputs/apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: secure-marketplace-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk


